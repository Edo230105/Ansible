---
# tasks file for ansible-visual-basic
---
- name: Compose paths
  ansible.builtin.set_fact:
    sofia_path: "{{ sofia_share_root }}\\{{ sofia_subfolder }}"
    sofia_check_full: "{{ sofia_share_root }}\\{{ sofia_subfolder }}\\{{ file_check }}"
    sofia_in_full: "{{ sofia_share_root }}\\{{ sofia_subfolder }}\\{{ file_in }}"
    local_in_full: "{{ path_in }}\\{{ file_in }}"
    local_out_full: "{{ path_out }}\\{{ file_out }}"
    log_full: "{{ path_log }}\\{{ file_log }}"
    etl_full: "{{ path_prog }}\\{{ etl_exe }}"

- name: Init ret
  ansible.builtin.set_fact:
    ret: 0

- name: Check local input folder exists
  ansible.windows.win_stat:
    path: "{{ path_in }}"
  register: local_in_folder_stat
  failed_when: false

- name: Set ret for folder input
  ansible.builtin.set_fact:
    ret: >-
      {% if not local_in_folder_stat.stat.exists %}
      70
      {% else %}
      0
      {% endif %}

- name: Check local output folder exists
  ansible.windows.win_stat:
    path: "{{ path_out }}"
  register: local_out_folder_stat
  failed_when: false

- name: Set ret for folder output
  ansible.builtin.set_fact:
    ret: >-
      {% if not local_out_folder_stat.stat.exists %}
      80
      {% else %}
      0
      {% endif %}

- name: Check local log folder exists
  ansible.windows.win_stat:
    path: "{{ path_log }}"
  register: local_log_folder_stat
  failed_when: false

- name: Set ret for folder log
  ansible.builtin.set_fact:
    ret: >-
      {% if not local_log_folder_stat.stat.exists %}
      90
      {% else %}
      0
      {% endif %}

- name: Check check-file exists
  ansible.windows.win_stat:
    path: "{{ local_in_full }}"
  register: local_check_stat
  failed_when: false
  when: ret == 0

- name: Set ret if check-file missing
  ansible.builtin.set_fact:
    ret: "{{ 100 if (not local_check_stat.stat.exists) else 0 }}"
  when: ret == 0

- name: Run ETL
  ansible.windows.win_command: '"{{ etl_full }}" {{ etl_arg }}'
  register: etl_run
  failed_when: false
  when: ret == 0

- name: Check output file exists
  ansible.windows.win_stat:
    path: "{{ local_out_full }}"
  register: out_stat
  failed_when: false
  when: ret == 0

- name: Set ret if output missing
  ansible.builtin.set_fact:
    ret: "{{ 0 if out_stat.stat.exists else 20 }}"
  when: ret == 0

- name: Delete check-file on Sofia
  ansible.windows.win_file:
    path: "{{ sofia_check_full }}"
    state: absent
  failed_when: false
  when: ret == 0

- name: Delete input CSV on Sofia
  ansible.windows.win_file:
    path: "{{ sofia_in_full }}"
    state: absent
  failed_when: false
  when: ret == 0

- name: Get domain and user
  ansible.windows.win_command: >-
    powershell -NoProfile -Command
    "$u=$env:USERNAME; $d=$env:USERDNSDOMAIN; Write-Output ($d + '\' + $u)"
  register: whoami_domain
  changed_when: false
  failed_when: false

- name: Write log line
  ansible.windows.win_lineinfile:
    path: "{{ log_full }}"
    create: true
    line: "{{ (whoami_domain.stdout | trim) }} {{ ansible_date_time.date }} {{ ansible_date_time.time }} Ret={{ ret }}"
  failed_when: false

- name: Fail if ret != 0
  ansible.builtin.fail:
    msg: "IOFIN Antiterrorismo failed with Ret={{ ret }}"
  when: ret != 0

